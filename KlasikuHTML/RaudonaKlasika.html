
<!DOCTYPE html>
<html>
<head>
  <title>3D Model</title>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
<model-viewer
    src="/Klasika/KlasikaRaudona.glb"
    camera-controls
    auto-rotate
    exposure="2"
    camera-orbit="0deg 75deg 1m"
    shadow-intensity="1">
</model-viewer>

</body>
</html>
