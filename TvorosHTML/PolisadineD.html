
<!DOCTYPE html>
<html>
<head>
  <title>3D Model</title>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
<model-viewer
  src="../Tvoros/PolisadineD.glb"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-softness="1"
  shadow-intensity="1"
  shadow-softness="0.8"
  camera-orbit="0deg 75deg 1m">
</model-viewer> 

</body>
</html>
